name: Secret Scan - TruffleHog

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare report directory
        run: |
          mkdir -p reports/secret-scan/trufflehog

      - name: Run TruffleHog
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            trufflesecurity/trufflehog:latest \
            filesystem /repo \
            --json \
            --no-update \
            > reports/secret-scan/trufflehog/trufflehog.jsonl || true

      - name: Upload TruffleHog report
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-trufflehog
          path: reports/secret-scan/trufflehog/trufflehog.jsonl
          retention-days: 30
