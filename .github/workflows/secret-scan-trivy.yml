name: Secret Scan - Trivy

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy-secret:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare report directory
        run: |
          mkdir -p reports/secret-scan/trivy

      - name: Run Trivy secret scan
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            aquasec/trivy:latest \
            fs \
            --scanners secret \
            --format json \
            --output /repo/reports/secret-scan/trivy/trivy-secret.json \
            /repo || true

      - name: Upload Trivy secret scan report
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-trivy
          path: reports/secret-scan/trivy/trivy-secret.json
          retention-days: 30
