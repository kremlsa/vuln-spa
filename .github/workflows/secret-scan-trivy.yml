name: Secret Scan - Trivy

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy-secret:
    runs-on: ubuntu-latest

    env:
      REPORT_DIR: reports/secret-scan/trivy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare report directory
        run: |
          mkdir -p "$REPORT_DIR/raw"

      - name: Create scan file list
        run: |
          find . \
            -type f \
            \( \
              -name "*.java" -o \
              -name "*.js" -o \
              -name "*.jsx" -o \
              -name "*.ts" -o \
              -name "*.tsx" -o \
              -name "*.json" -o \
              -name "*.yaml" -o \
              -name "*.yml" -o \
              -name "*.properties" -o \
              -name "*.env" -o \
              -name "*.sh" -o \
              -name "Dockerfile" -o \
              -name "docker-compose.yml" \
            \) \
            ! -path "./.git/*" \
            ! -path "./.github/*" \
            ! -path "./reports/*" \
            ! -path "./frontend/node_modules/*" \
            ! -path "./frontend/dist/*" \
            ! -path "./backend/target/*" \
            ! -name "pom.xml" \
            ! -name "package-lock.json" \
            ! -name "yarn.lock" \
            ! -name "pnpm-lock.yaml" \
            > "$REPORT_DIR/files.txt"

          cat "$REPORT_DIR/files.txt"

      - name: Run Trivy secret scan per file
        run: |
          : > "$REPORT_DIR/raw/trivy-secret.jsonl"

          while IFS= read -r file; do
            echo "Scanning $file"

            docker run --rm \
              -v "$PWD:/repo" \
              aquasec/trivy:latest \
              fs \
              --scanners secret \
              --skip-db-update \
              --skip-java-db-update \
              --format json \
              "/repo/${file#./}" \
              >> "$REPORT_DIR/raw/trivy-secret.jsonl" || true

          done < "$REPORT_DIR/files.txt"

      - name: Upload Trivy secret scan report
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-trivy
          path: reports/secret-scan/trivy/
          retention-days: 30
