name: Secret Scan - Trivy

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy-secret:
    runs-on: ubuntu-latest

    env:
      REPORT_DIR: reports/secret-scan/trivy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare report directory
        run: |
          mkdir -p "$REPORT_DIR"

      - name: Run Trivy secret scan
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            aquasec/trivy:latest \
            fs \
            --scanners secret \
            --skip-dirs /repo/.git \
            --skip-dirs /repo/.github \
            --skip-dirs /repo/frontend/node_modules \
            --skip-dirs /repo/backend/target \
            --skip-dirs /repo/reports \
            --format json \
            --output /repo/$REPORT_DIR/trivy-secret.json \
            /repo || true

      - name: Upload Trivy secret scan report
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-trivy
          path: reports/secret-scan/trivy/trivy-secret.json
          retention-days: 30
