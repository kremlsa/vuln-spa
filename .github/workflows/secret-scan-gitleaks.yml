name: Secret Scan - Gitleaks

on:
  workflow_dispatch:
    inputs:
      scan_mode:
        description: "Gitleaks scan mode"
        required: true
        default: "filesystem"
        type: choice
        options:
          - filesystem
          - git-history

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    env:
      REPORT_DIR: reports/secret-scan/gitleaks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare report directory
        run: |
          mkdir -p "$REPORT_DIR"

      - name: Run Gitleaks - filesystem scan
        if: ${{ github.event.inputs.scan_mode == 'filesystem' }}
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            detect \
            --source="/repo" \
            --no-git \
            --report-format=json \
            --report-path="/repo/$REPORT_DIR/gitleaks-filesystem.json" \
            --exit-code=0

      - name: Run Gitleaks - git history scan
        if: ${{ github.event.inputs.scan_mode == 'git-history' }}
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            detect \
            --source="/repo" \
            --report-format=json \
            --report-path="/repo/$REPORT_DIR/gitleaks-history.json" \
            --exit-code=0

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-gitleaks-${{ github.event.inputs.scan_mode }}
          path: reports/secret-scan/gitleaks/
          retention-days: 30
