name: Secret Scan - Gitleaks

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare report directory
        run: |
          mkdir -p reports/secret-scan/gitleaks

      - name: Run Gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            detect \
            --source="/repo" \
            --report-format=json \
            --report-path="/repo/reports/secret-scan/gitleaks/gitleaks.json" \
            --exit-code=0

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-gitleaks
          path: reports/secret-scan/gitleaks/gitleaks.json
          retention-days: 30
