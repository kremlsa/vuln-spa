env:
  vars:
    TARGET_URL: ${TARGET_URL}

  contexts:
    - name: vulnerable-spa
      urls:
        - "${TARGET_URL}"
      includePaths:
        - "${TARGET_URL}.*"
      excludePaths:
        - "${TARGET_URL}/logout.*"

      authentication:
        method: json
        parameters:
          # Страница логина берётся из переменной запуска
          loginPageUrl: "${TARGET_URL}/login"
          # JSON login endpoint берётся из переменной запуска
          loginRequestUrl: "${TARGET_URL}/api/auth/login"
          loginRequestBody: '{"username":"{%username%}","password":"{%password%}"}'

      sessionManagement:
        method: cookie

      verification:
        # Проверка успешной аутентификации по ответу /api/auth/me
        method: response
        loggedInRegex: '(?i)("username"\s*:\s*"admin"|"roles"\s*:\s*\[\s*"ROLE_ADMIN"\s*\]|"isVip"\s*:\s*true)'
        # Проверка выхода из сессии или отсутствия доступа
        loggedOutRegex: '(?i)(unauthorized|forbidden|401|403|login|sign in|\"username\"\s*:\s*null|\"roles\"\s*:\s*\[\s*\])'

      users:
        - name: test-user
          credentials:
            username: "admin"
            password: "secret"

jobs:
  - type: spider
    parameters:
      context: vulnerable-spa
      user: test-user
      url: "${TARGET_URL}"
      maxDuration: 15
      maxDepth: 0
      maxChildren: 0
      acceptCookies: true
      handleODataParametersVisited: true
      parseComments: true
      parseGit: true
      parseRobotsTxt: true
      parseSitemapXml: true
      postForm: true
      processForm: true
      requestWaitTime: 100
      sendRefererHeader: true
      threadCount: 10
      userAgent: "Mozilla/5.0 ZAP-SPA-Scan"

  - type: spiderAjax
    parameters:
      context: vulnerable-spa
      user: test-user
      url: "${TARGET_URL}"
      browserId: firefox-headless
      maxDuration: 20
      maxCrawlDepth: 0
      maxCrawlStates: 0
      eventWait: 1500
      reloadWait: 1500
      clickDefaultElems: false
      clickElemsOnce: false
      randomInputs: true
      inScopeOnly: true

  - type: passiveScan-wait
    parameters:
      maxDuration: 15

  - type: activeScan
    parameters:
      context: vulnerable-spa
      user: test-user
      maxScanDurationInMins: 45
      maxRuleDurationInMins: 10
      addQueryParam: true
      delayInMs: 0
      handleAntiCSRFTokens: true
      injectPluginIdInHeader: true
      scanHeadersAllRequests: true
      threadPerHost: 10

  - type: report
    parameters:
      template: traditional-html
      reportDir: /zap/wrk
      reportFile: zap-full-report.html
      reportTitle: ZAP Authenticated SPA Aggressive Scan Report

  - type: report
    parameters:
      template: traditional-json
      reportDir: /zap/wrk
      reportFile: zap-full-report.json
      reportTitle: ZAP Authenticated SPA Aggressive Scan Report
