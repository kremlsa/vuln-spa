env:
  contexts:
    - name: vulnerable-spa
      urls:
        - "http://host.docker.internal:8080"
      includePaths:
        - "http://host.docker.internal:8080.*"
      excludePaths:
        - "http://host.docker.internal:8080/logout.*"

      authentication:
        method: json
        parameters:
          loginPageUrl: "http://host.docker.internal:8080/login"
          loginRequestUrl: "http://host.docker.internal:8080/api/auth/login"
          loginRequestBody: '{"username":"{%username%}","password":"{%password%}"}'

      sessionManagement:
        method: cookie

      users:
        - name: test-user
          credentials:
            username: "admin"
            password: "secret"

jobs:
  - type: openapi
    parameters:
      apiFile: "/zap/wrk/openapi.json"
      targetUrl: "http://host.docker.internal:8080"
      context: vulnerable-spa
      user: test-user

  - type: passiveScan-wait
    parameters:
      maxDuration: 10

  - type: activeScan-policy
    parameters:
      name: aggressive-policy
    policyDefinition:
      defaultStrength: High
      defaultThreshold: Low

  - type: activeScan
    parameters:
      context: vulnerable-spa
      user: test-user
      policy: aggressive-policy
      maxScanDurationInMins: 30
      maxRuleDurationInMins: 5
      addQueryParam: true
      delayInMs: 0
      handleAntiCSRFTokens: true
      injectPluginIdInHeader: true
      scanHeadersAllRequests: true
      threadPerHost: 5

  - type: report
    parameters:
      template: traditional-html
      reportDir: /zap/wrk
      reportFile: zap-api-report.html
      reportTitle: ZAP Authenticated API Scan Report

  - type: report
    parameters:
      template: traditional-json
      reportDir: /zap/wrk
      reportFile: zap-api-report.json
      reportTitle: ZAP Authenticated API Scan Report